<style>
  :root {
    --bg-app: #fcfcfd;
    --bg-panel: #ffffff;
    --bg-subtle: #f8f8f9;
    --bg-hover: #f1f1f3;
    --bg-active: #ececee;
    --bg-accent: #fdf2f5;
    --border-soft: #e7e7e9;
    --border-strong: #d9d9de;
    --text-strong: #1f1f24;
    --text-muted: #65636d;
    --text-subtle: #8b8894;
    --accent: #d6407d;
    --accent-strong: #c22969;
    --accent-contrast: #ffffff;
    --shadow-panel: 0 10px 25px rgba(17, 17, 26, 0.06);
    --shadow-soft: 0 1px 2px rgba(17, 17, 26, 0.06);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font-ui: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--bg-app);
    color: var(--text-strong);
    font-family: var(--font-ui);
  }

  body {
    width: 100%;
  }

  button,
  input {
    font: inherit;
  }

  button {
    border: 0;
    background: none;
    cursor: pointer;
  }

  .app-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(circle at top right, rgba(214, 64, 125, 0.08), transparent 42%),
      linear-gradient(180deg, #ffffff 0%, #fcfcfd 100%);
  }

  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: rgba(255, 255, 255, 0.88);
    border-bottom: 1px solid var(--border-soft);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .tab {
    position: relative;
    padding: 18px 12px 16px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
    transition: color 0.16s ease, background-color 0.16s ease;
  }

  .tab + .tab {
    border-left: 1px solid var(--border-soft);
  }

  .tab:hover {
    color: var(--text-strong);
    background: rgba(255, 255, 255, 0.65);
  }

  .tab.active {
    color: var(--accent-strong);
  }

  .tab.active::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -1px;
    height: 2px;
    background: var(--accent);
  }

  .view-stack {
    flex: 1;
    padding: 22px 18px 0;
  }

  .view {
    display: none;
    min-height: calc(100vh - 64px - 86px);
  }

  .view.active {
    display: block;
  }

  .surface {
    background: rgba(255, 255, 255, 0.84);
    border: 1px solid rgba(231, 231, 233, 0.92);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-panel);
    padding: 18px;
  }

  .stack-lg {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .text-input {
    width: 100%;
    min-height: 52px;
    padding: 0 16px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--bg-panel);
    color: var(--text-strong);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.01em;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    transition: border-color 0.16s ease, box-shadow 0.16s ease;
  }

  .text-input:focus {
    outline: none;
    border-color: rgba(214, 64, 125, 0.42);
    box-shadow: 0 0 0 4px rgba(214, 64, 125, 0.12);
  }

  .control-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 52px;
    gap: 10px;
    align-items: end;
  }

  .menu-shell {
    position: relative;
  }

  .menu-trigger {
    width: 100%;
    min-height: 48px;
    padding: 0 42px 0 16px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--bg-panel);
    color: var(--text-strong);
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    box-shadow: var(--shadow-soft);
    transition: border-color 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
  }

  .menu-trigger:hover {
    background: var(--bg-subtle);
  }

  .menu-trigger:focus-visible,
  .menu-trigger[data-open="true"] {
    outline: none;
    border-color: rgba(214, 64, 125, 0.42);
    box-shadow: 0 0 0 4px rgba(214, 64, 125, 0.12);
  }

  .menu-chevron {
    position: absolute;
    top: 50%;
    right: 16px;
    width: 14px;
    height: 14px;
    margin-top: -7px;
    color: #b3b1b9;
    pointer-events: none;
  }

  .menu-content {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    display: none;
    padding: 6px;
    background: rgba(255, 255, 255, 0.98);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    box-shadow: 0 18px 40px rgba(17, 17, 26, 0.14);
    z-index: 3;
  }

  .menu-content.open {
    display: grid;
    gap: 2px;
  }

  .menu-item {
    width: 100%;
    min-height: 36px;
    padding: 0 10px;
    display: flex;
    align-items: center;
    border-radius: 10px;
    color: var(--text-strong);
    font-size: 14px;
    font-weight: 500;
    text-align: left;
  }

  .menu-item:hover {
    background: var(--bg-hover);
  }

  .menu-item.active {
    background: var(--bg-accent);
    color: var(--accent-strong);
  }

  .icon-button {
    min-width: 52px;
    min-height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--bg-panel);
    color: var(--text-strong);
    transition: background-color 0.16s ease, border-color 0.16s ease, color 0.16s ease;
  }

  .icon-button:hover {
    background: var(--bg-hover);
    border-color: #c7c7cf;
  }

  .icon-button:focus-visible {
    outline: none;
    border-color: rgba(214, 64, 125, 0.42);
    box-shadow: 0 0 0 4px rgba(214, 64, 125, 0.12);
  }

  .results {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 12px 2px 6px;
  }

  .row {
    display: grid;
    grid-template-columns: 48px minmax(0, 1fr) 92px;
    gap: 14px;
    align-items: center;
  }

  .stop-label {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.03em;
    text-align: right;
  }

  .swatch {
    height: 42px;
    border-radius: 11px;
    border: 1px solid rgba(17, 17, 26, 0.05);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), var(--shadow-soft);
  }

  .hex-label {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
    text-transform: lowercase;
  }

  .placeholder {
    min-height: 100%;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 44px 18px;
  }

  .placeholder-card {
    width: 100%;
    max-width: 320px;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid var(--border-soft);
    border-radius: 24px;
    padding: 28px 22px;
    box-shadow: var(--shadow-panel);
  }

  .placeholder-title {
    margin: 0 0 10px;
    font-size: 20px;
    letter-spacing: -0.03em;
  }

  .placeholder-copy {
    margin: 0;
    color: var(--text-muted);
    line-height: 1.5;
    font-size: 14px;
  }

  .footer {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 170px;
    gap: 14px;
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border-soft);
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
  }

  .button-secondary,
  .button-primary {
    min-height: 54px;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.02em;
    border-radius: var(--radius-md);
  }

  .button-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    color: var(--text-strong);
    padding: 0 12px;
    border: 1px solid var(--border-soft);
    background: rgba(255, 255, 255, 0.84);
    box-shadow: var(--shadow-soft);
    transition: background-color 0.16s ease, border-color 0.16s ease;
  }

  .button-secondary:hover {
    background: var(--bg-hover);
    border-color: #d2d2d8;
  }

  .button-primary {
    background: #1f2a56;
    color: var(--accent-contrast);
    border-radius: var(--radius-md);
    box-shadow: 0 8px 18px rgba(31, 42, 86, 0.22);
  }

  .button-primary:hover {
    background: #1a2348;
  }

  .button-primary:focus-visible,
  .button-secondary:focus-visible {
    outline: none;
    box-shadow: 0 0 0 4px rgba(214, 64, 125, 0.12);
  }

  .plus-icon {
    font-size: 24px;
    line-height: 1;
    font-weight: 300;
  }

  .footer-label {
    font-size: 15px;
  }
</style>

<div class="app-shell">
  <div class="tabs" role="tablist" aria-label="Palette sections">
    <button class="tab active" id="tab-generate" data-view="generate" role="tab" aria-selected="true">Generate</button>
    <button class="tab" id="tab-library" data-view="library" role="tab" aria-selected="false">Library</button>
    <button class="tab" id="tab-explore" data-view="explore" role="tab" aria-selected="false">Explore</button>
  </div>

  <div class="view-stack">
    <section class="view active" id="view-generate" data-view-panel="generate" role="tabpanel" aria-labelledby="tab-generate">
      <div class="surface stack-lg">
        <label class="field">
          <span class="field-label">Base color</span>
          <input class="text-input" id="colorInput" type="text" placeholder="#3B82F6" value="#3B82F6" />
        </label>

        <div class="control-row">
          <label class="field">
            <span class="field-label">Palette system</span>
            <div class="menu-shell">
              <button id="systemMenuTrigger" class="menu-trigger" type="button" aria-haspopup="menu" aria-expanded="false" data-open="false">Tailwind</button>
              <svg class="menu-chevron" viewBox="0 0 10 6" aria-hidden="true">
                <path d="M1 1L5 5L9 1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              <div id="systemMenu" class="menu-content" role="menu" aria-label="Palette system">
                <button class="menu-item active" type="button" role="menuitemradio" aria-checked="true" data-system="tailwind">Tailwind</button>
                <button class="menu-item" type="button" role="menuitemradio" aria-checked="false" data-system="material">Material</button>
                <button class="menu-item" type="button" role="menuitemradio" aria-checked="false" data-system="ant">Ant Design</button>
                <button class="menu-item" type="button" role="menuitemradio" aria-checked="false" data-system="carbon">Carbon</button>
                <button class="menu-item" type="button" role="menuitemradio" aria-checked="false" data-system="bootstrap">Bootstrap</button>
                <button class="menu-item" type="button" role="menuitemradio" aria-checked="false" data-system="radix">Radix UI</button>
              </div>
            </div>
          </label>

          <button id="sortToggle" class="icon-button" type="button" aria-label="Toggle sort order">
            <svg id="sortIcon" width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
              <path d="M3.78233 2.21713C3.70732 2.14212 3.60557 2.09998 3.49949 2.09998C3.3934 2.09998 3.29166 2.14212 3.21664 2.21713L1.21664 4.21713C1.06044 4.37334 1.06044 4.62661 1.21664 4.78282C1.37285 4.93903 1.62612 4.93903 1.78233 4.78282L3.09949 3.46566L3.09949 11.5343L1.78233 10.2171C1.62612 10.0609 1.37285 10.0609 1.21664 10.2171C1.06043 10.3733 1.06043 10.6266 1.21664 10.7828L3.21664 12.7828C3.29166 12.8578 3.3934 12.9 3.49949 12.9C3.60557 12.9 3.70731 12.8578 3.78233 12.7828L5.78233 10.7828C5.93854 10.6266 5.93854 10.3733 5.78233 10.2171C5.62612 10.0609 5.37285 10.0609 5.21664 10.2171L3.89949 11.5343L3.89949 3.46566L5.21664 4.78282C5.37285 4.93903 5.62612 4.93903 5.78233 4.78282C5.93854 4.62661 5.93854 4.37334 5.78233 4.21713L3.78233 2.21713ZM8.49998 3.99997C8.22383 3.99997 7.99998 4.22382 7.99998 4.49997C7.99998 4.77611 8.22383 4.99997 8.49998 4.99997H14.5C14.7761 4.99997 15 4.77611 15 4.49997C15 4.22382 14.7761 3.99997 14.5 3.99997H8.49998ZM7.99998 7.49997C7.99998 7.22382 8.22383 6.99997 8.49998 6.99997H14.5C14.7761 6.99997 15 7.22382 15 7.49997C15 7.77611 14.7761 7.99997 14.5 7.99997H8.49998C8.22383 7.99997 7.99998 7.77611 7.99998 7.49997ZM8.49998 9.99997C8.22383 9.99997 7.99998 10.2238 7.99998 10.5C7.99998 10.7761 8.22383 11 8.49998 11H14.5C14.7761 11 15 10.7761 15 10.5C15 10.2238 14.7761 9.99997 14.5 9.99997H8.49998Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
          </button>
        </div>

        <div class="results" id="scale"></div>
      </div>
    </section>

    <section class="view" id="view-library" data-view-panel="library" role="tabpanel" aria-labelledby="tab-library">
      <div class="placeholder">
        <div class="placeholder-card">
          <h2 class="placeholder-title">Library</h2>
          <p class="placeholder-copy">A saved-palette area is coming next. This pane is wired into the new three-section shell already.</p>
        </div>
      </div>
    </section>

    <section class="view" id="view-explore" data-view-panel="explore" role="tabpanel" aria-labelledby="tab-explore">
      <div class="placeholder">
        <div class="placeholder-card">
          <h2 class="placeholder-title">Explore</h2>
          <p class="placeholder-copy">Use this space for inspiration, presets, and discovery once we layer in richer browsing behavior.</p>
        </div>
      </div>
    </section>
  </div>

  <div class="footer">
    <button class="button-secondary" id="saveLibrary" type="button">
      <span class="plus-icon" aria-hidden="true">+</span>
      <span class="footer-label">Save to library</span>
    </button>
    <button class="button-primary" id="insert" type="button">Insert frame</button>
  </div>
</div>

<script>
  let currentScale = [];
  let sortAscending = true;
  let selectedSystem = "tailwind";
  let activeView = "generate";

  const colorInput = document.getElementById("colorInput");
  const systemMenuTrigger = document.getElementById("systemMenuTrigger");
  const systemMenu = document.getElementById("systemMenu");
  const systemItems = Array.from(document.querySelectorAll(".menu-item"));
  const scaleContainer = document.getElementById("scale");
  const sortToggle = document.getElementById("sortToggle");
  const insertButton = document.getElementById("insert");
  const tabs = Array.from(document.querySelectorAll(".tab"));
  const views = Array.from(document.querySelectorAll(".view"));

  function renderScale() {
    scaleContainer.innerHTML = "";

    const scaleToRender = sortAscending ? currentScale : [...currentScale].reverse();

    scaleToRender.forEach(({ stop, hex }) => {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <span class="stop-label">${stop}</span>
        <div class="swatch" style="background:${hex}"></div>
        <span class="hex-label">${hex.toLowerCase()}</span>
      `;
      scaleContainer.appendChild(row);
    });

    const icon = document.getElementById("sortIcon");
    if (icon) {
      icon.style.transform = sortAscending ? "scaleY(1)" : "scaleY(-1)";
    }
  }

  function triggerGeneration() {
    let color = colorInput.value.trim();
    if (!color.startsWith("#")) color = `#${color}`;
    parent.postMessage({ pluginMessage: { type: "generate-scale", color, system: selectedSystem } }, "*");
  }

  function setActiveView(nextView) {
    activeView = nextView;

    tabs.forEach((tab) => {
      const isActive = tab.dataset.view === nextView;
      tab.classList.toggle("active", isActive);
      tab.setAttribute("aria-selected", String(isActive));
    });

    views.forEach((view) => {
      view.classList.toggle("active", view.dataset.viewPanel === nextView);
    });

    insertButton.style.visibility = nextView === "generate" ? "visible" : "hidden";
  }

  function setMenuOpen(isOpen) {
    systemMenu.classList.toggle("open", isOpen);
    systemMenuTrigger.dataset.open = String(isOpen);
    systemMenuTrigger.setAttribute("aria-expanded", String(isOpen));
  }

  function setSelectedSystem(nextSystem) {
    selectedSystem = nextSystem;

    systemItems.forEach((item) => {
      const isActive = item.dataset.system === nextSystem;
      item.classList.toggle("active", isActive);
      item.setAttribute("aria-checked", String(isActive));
      if (isActive) {
        systemMenuTrigger.textContent = item.textContent;
      }
    });
  }

  tabs.forEach((tab) => {
    tab.addEventListener("click", () => {
      setActiveView(tab.dataset.view);
    });
  });

  systemMenuTrigger.addEventListener("click", () => {
    const nextState = !systemMenu.classList.contains("open");
    setMenuOpen(nextState);
  });

  systemItems.forEach((item) => {
    item.addEventListener("click", () => {
      setSelectedSystem(item.dataset.system);
      setMenuOpen(false);
      systemMenuTrigger.focus();
      triggerGeneration();
    });
  });

  document.addEventListener("click", (event) => {
    const target = event.target;
    if (!(target instanceof Element) || !target.closest(".menu-shell")) {
      setMenuOpen(false);
    }
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      setMenuOpen(false);
    }
  });

  colorInput.addEventListener("blur", () => {
    triggerGeneration();
  });

  sortToggle.addEventListener("click", () => {
    if (currentScale.length === 0) return;
    sortAscending = !sortAscending;
    renderScale();
  });

  colorInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      triggerGeneration();
    }
  });

  document.getElementById("saveLibrary").addEventListener("click", () => {
    setActiveView("library");
  });

  insertButton.addEventListener("click", () => {
    let color = colorInput.value.trim();
    if (!color.startsWith("#")) color = `#${color}`;
    parent.postMessage({ pluginMessage: { type: "insert-palette", color, system: selectedSystem } }, "*");
  });

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (msg.type === "scale-result") {
      currentScale = msg.scale;
      renderScale();
    }
  };

  setActiveView(activeView);
  setSelectedSystem(selectedSystem);
  setMenuOpen(false);
  triggerGeneration();
</script>
