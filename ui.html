<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  body {
    font-family: sans-serif;
    padding: 16px;
    width: 280px;
  }

  input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    box-sizing: border-box;
  }

  button {
    padding: 8px 16px;
    background: #18a0fb;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 4px;
  }

  .icon-btn {
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f0f0;
    color: #333;
  }
  
  .icon-btn:hover {
    background: #e0e0e0;
  }

  .icon-btn i {
    font-size: 16px;
  }

  .scale {
    display: flex;
    flex-direction: column;
    margin-top: 16px;
    gap: 4px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stop-label {
    font-size: 11px;
    width: 30px;
    text-align: right;
    color: #666;
  }

  .swatch {
    width: 120px;
    height: 24px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .hex-label {
    font-size: 11px;
    color: #444;
    font-family: monospace;
  }
</style>

<h2>Color Scale</h2>
<div style="display: flex; gap: 8px; align-items: center;">
  <input id="colorInput" type="text" placeholder="#3B82F6" value="#3B82F6" style="margin: 0; flex: 1;" />
  <button id="generate">Generate</button>
  <button id="sortToggle" class="icon-btn" style="padding: 6px;">
    <svg id="sortIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#333" viewBox="0 0 256 256" style="transition: transform 0.2s;"><path d="M136,120v96a8,8,0,0,1-16,0V120a8,8,0,0,1,16,0Zm64,72a8,8,0,0,0-8,8v16a8,8,0,0,0,16,0V200A8,8,0,0,0,200,192Zm24-32H208V40a8,8,0,0,0-16,0V160H176a8,8,0,0,0,0,16h48a8,8,0,0,0,0-16ZM56,160a8,8,0,0,0-8,8v48a8,8,0,0,0,16,0V168A8,8,0,0,0,56,160Zm24-32H64V40a8,8,0,0,0-16,0v88H32a8,8,0,0,0,0,16H80a8,8,0,0,0,0-16Zm72-48H136V40a8,8,0,0,0-16,0V80H104a8,8,0,0,0,0,16h48a8,8,0,0,0,0-16Z"></path></svg>
  </button>
</div>

<div class="scale" id="scale"></div>

<script>
  let currentScale = [];
  let sortAscending = true;

  function renderScale() {
    const container = document.getElementById('scale');
    container.innerHTML = '';

    const scaleToRender = sortAscending ? currentScale : [...currentScale].reverse();

    scaleToRender.forEach(({ stop, hex }) => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <span class="stop-label">${stop}</span>
        <div class="swatch" style="background:${hex}"></div>
        <span class="hex-label">${hex}</span>
      `;
      container.appendChild(row);
    });

    const icon = document.getElementById('sortIcon');
    if (icon) {
      icon.style.transform = sortAscending ? 'scaleY(1)' : 'scaleY(-1)';
    }
  }

  document.getElementById('sortToggle').onclick = () => {
    if (currentScale.length === 0) return;
    sortAscending = !sortAscending;
    renderScale();
  };

  document.getElementById('generate').onclick = () => {
    let color = document.getElementById('colorInput').value.trim();
    if (!color.startsWith('#')) color = '#' + color;
    parent.postMessage({ pluginMessage: { type: 'generate-scale', color } }, '*');
  }

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (msg.type === 'scale-result') {
      currentScale = msg.scale;
      renderScale();
    }
  }
</script>
